<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector</title>
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .job { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .job h2 { margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>What did you want to do?</h1>
        <div class="job">
            <h2>Pixel Art</h2>
            <p>Create 2D pixel art for the game.</p>
            <button>SELECT</button>
        </div>
        <div class="job">
            <h2>Programming</h2>
            <p>Develop and implement game logic, features, and tools.</p>
            <button>SELECT</button>
        </div>
        <div class="job">
            <h2>Music Composition</h2>
            <p>Create soundtracks and sound effect for the game.</p>
            <button>SELECT</button>
        </div>
    </div>
</body>
</html>
